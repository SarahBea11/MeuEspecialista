<div class="login-container">

    <div class="login-esquerda">
        <div class="logo-box">
            <img src="assets/logo-especialista.png" alt="Meu Especialista">
        </div>
    </div>

    <div class="login-direita">
        <div class="form-wrapper">

            <h1>Login</h1>

            <div class="input-group">
                <label>E-mail</label>
                <input type="email">
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password">
            </div>

            <a href="#" class="forgot">Esqueceu a senha?</a>

            <button type ="button" class="btn btn-entrar">Entrar</button>

            <button type ="button" class="btn btn-cadastro" routerLink="/cadastro">
                Cadastrar-se
            </button>

        </div>
    </div>

</div>
